<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of the Fallen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap');

        body { font-family: 'Crimson Text', serif; }
        .title-font { font-family: 'Cinzel', serif; }

        /* Scrollbar styling */
        #narrative-log::-webkit-scrollbar { width: 4px; }
        #narrative-log::-webkit-scrollbar-track { background: transparent; }
        #narrative-log::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 2px; }

        /* Typing cursor effect on latest message */
        .latest-msg::after {
            content: '|';
            animation: blink 1s infinite;
            color: #a855f7;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* HP bar */
        #hp-bar-fill {
            transition: width 0.5s ease, background-color 0.5s ease;
        }

        /* Input glow */
        #action-input:focus { outline: none; }

        .action-row {
            background: rgba(5, 3, 15, 0.9);
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }

        /* Fade in new messages */
        @keyframes msgFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-fade { animation: msgFadeIn 0.4s ease forwards; }

        /* Scene image fade */
        #scene-image { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-3xl flex flex-col h-[90vh] bg-gray-900 border border-purple-900/40 rounded-lg shadow-[0_0_40px_rgba(88,28,135,0.3)] overflow-hidden">

        <!-- Scene image panel -->
        <div class="relative h-56 bg-gray-950 border-b border-purple-900/30 flex items-center justify-center overflow-hidden flex-shrink-0">
            <img id="scene-image" src="" alt="" class="object-cover w-full h-full opacity-0 absolute inset-0">
            <div id="image-placeholder" class="flex flex-col items-center gap-2 text-gray-700">
                <span class="text-4xl">🌑</span>
                <span class="title-font text-xs tracking-widest uppercase">The void awaits</span>
            </div>
        </div>

        <!-- Status bar -->
        <div class="flex items-center justify-between px-5 py-2 bg-gray-950/80 border-b border-purple-900/20 flex-shrink-0">
            <!-- Player info -->
            <div class="flex items-center gap-3">
                <span id="class-icon" class="text-lg">⚔️</span>
                <div>
                    <div id="player-name-display" class="title-font text-purple-300 text-xs tracking-wider"></div>
                    <div id="class-display" class="text-gray-600 text-xs"></div>
                </div>
            </div>

            <!-- HP bar -->
            <div class="flex items-center gap-3">
                <div class="flex flex-col items-end">
                    <span id="hp-text" class="text-red-400 text-xs title-font"></span>
                    <div class="w-28 h-2 bg-gray-800 rounded-full overflow-hidden mt-1">
                        <div id="hp-bar-fill" class="h-full bg-red-600 rounded-full" style="width:100%"></div>
                    </div>
                </div>
            </div>

            <!-- Location -->
            <div class="text-right">
                <div class="text-gray-600 text-xs title-font tracking-widest uppercase">Location</div>
                <div id="location-display" class="text-purple-400 text-xs"></div>
            </div>
        </div>

        <!-- Narrative log -->
        <div id="narrative-log" class="flex-1 p-6 overflow-y-auto space-y-4 min-h-0">
            <p class="text-purple-500 italic title-font text-sm tracking-wide">— The void stirs. Your story begins. —</p>
        </div>

        <!-- Input row -->
        <div class="action-row p-4 flex gap-3 items-center flex-shrink-0">
            <span class="text-purple-700 title-font text-lg">›</span>
            <input
                type="text"
                id="action-input"
                placeholder="What do you do?"
                class="flex-1 bg-transparent text-green-400 placeholder-gray-700 font-mono text-sm border-none outline-none"
            />
            <button id="submit-btn"
                class="title-font text-xs tracking-widest uppercase px-4 py-2 bg-purple-900 hover:bg-purple-700 text-white rounded transition-all">
                Act
            </button>
        </div>
    </div>

    <script>
        // ── 1. Read session from login page ──────────────────────────────
        const playerName  = sessionStorage.getItem('playerName')  || 'wanderer';
        const playerClass = sessionStorage.getItem('playerClass') || 'ashen_knight';
        const playerId    = playerName.toLowerCase().replace(/\s+/g, '_');

        // If no session, redirect to login
        if (!sessionStorage.getItem('playerName')) {
            window.location.href = 'login.html';
        }

        // ── 2. Class metadata ─────────────────────────────────────────────
        const CLASS_META = {
            ashen_knight: { icon: '⚔️',  label: 'Ashen Knight' },
            void_drifter: { icon: '🗡️',  label: 'Void Drifter' },
            rune_scribe:  { icon: '📜',  label: 'Rune-Scribe'  },
            void_ranger:  { icon: '🏹',  label: 'Void Ranger'  },
        };

        // ── 3. UI refs ────────────────────────────────────────────────────
        const log         = document.getElementById('narrative-log');
        const input       = document.getElementById('action-input');
        const btn         = document.getElementById('submit-btn');
        const hpText      = document.getElementById('hp-text');
        const hpBar       = document.getElementById('hp-bar-fill');
        const locationEl  = document.getElementById('location-display');
        const nameEl      = document.getElementById('player-name-display');
        const classEl     = document.getElementById('class-display');
        const classIcon   = document.getElementById('class-icon');
        const sceneImg    = document.getElementById('scene-image');
        const placeholder = document.getElementById('image-placeholder');

        // ── 4. Init UI ────────────────────────────────────────────────────
        const meta = CLASS_META[playerClass] || CLASS_META['ashen_knight'];
        nameEl.textContent    = playerName;
        classEl.textContent   = meta.label;
        classIcon.textContent = meta.icon;
        locationEl.textContent = 'Ashen Courtyard';
        updateHP(30, 30);

        function updateHP(current, max) {
            hpText.textContent = `HP ${current} / ${max}`;
            const pct = Math.max(0, (current / max) * 100);
            hpBar.style.width = pct + '%';
            hpBar.style.backgroundColor = pct > 50 ? '#dc2626' : pct > 25 ? '#ea580c' : '#991b1b';
        }

        function formatLocation(loc) {
            return loc.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function addMessage(text, color = 'text-gray-300') {
            // Remove cursor from previous latest
            document.querySelectorAll('.latest-msg').forEach(el => el.classList.remove('latest-msg'));
            const p = document.createElement('p');
            p.className = `${color} leading-relaxed msg-fade`;
            p.textContent = text;
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
            return p;
        }

        // ── 5. Core action ────────────────────────────────────────────────
        async function sendAction() {
            const actionText = input.value.trim();
            if (!actionText) return;

            addMessage(`› ${actionText}`, 'text-green-500 opacity-80 font-mono text-sm');
            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            btn.textContent = '...';

            // Thinking indicator
            const thinking = addMessage('The void considers your action...', 'text-gray-600 italic text-sm');

            try {
                const response = await fetch('http://localhost:8000/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        player_id: playerId,
                        player_class: playerClass,
                        action: actionText
                    })
                });

                const data = await response.json();
                thinking.remove();

                // Narrative
                addMessage(data.text, 'text-gray-200');

                // Update status
                if (data.location) locationEl.textContent = formatLocation(data.location);
                if (data.hp !== undefined) updateHP(data.hp, data.max_hp);

                // Update image
                if (data.image_base64) {
                    sceneImg.src = `data:image/png;base64,${data.image_base64}`;
                    sceneImg.style.opacity = '1';
                    placeholder.style.display = 'none';
                }

                // Death
                if (data.status === 'dead') {
                    addMessage('☠ You have fallen. Your lineage will carry on...', 'text-red-500 title-font');
                    input.disabled = true;
                    btn.disabled = true;
                    return;
                }

            } catch (err) {
                thinking.remove();
                addMessage('Error reaching the server. Is uvicorn running?', 'text-red-500 text-sm');
            }

            input.disabled = false;
            btn.disabled = false;
            btn.textContent = 'Act';
            input.focus();
        }

        // ── 6. Events ─────────────────────────────────────────────────────
        btn.addEventListener('click', sendAction);
        input.addEventListener('keypress', e => { if (e.key === 'Enter') sendAction(); });
    </script>
</body>
</html>
