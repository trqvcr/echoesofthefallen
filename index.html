<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of the Fallen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap');

        body { 
            font-family: 'Crimson Text', serif; 
            background-color: #030609;
        }
        .title-font { font-family: 'Cinzel', serif; }

        #narrative-log::-webkit-scrollbar { width: 4px; }
        #narrative-log::-webkit-scrollbar-track { background: transparent; }
        #narrative-log::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 2px; }

        .stat-bar-bg { background: rgba(255,255,255,0.05); border: 1px solid rgba(139, 92, 246, 0.1); }
        #hp-bar-fill { transition: width 0.5s ease; box-shadow: 0 0 10px rgba(220, 38, 38, 0.4); }
        
        .action-row {
            background: rgba(5, 3, 15, 0.9);
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }

        @keyframes msgFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-fade { animation: msgFadeIn 0.4s ease forwards; }
        
        .sidebar-box {
            background: rgba(15, 10, 25, 0.6);
            border: 1px solid rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-6xl flex gap-6 h-[90vh]">

        <!-- Sidebar -->
        <div class="w-72 flex flex-col gap-4 flex-shrink-0">
            
            <div class="sidebar-box rounded-lg p-5">
                <div class="flex items-center gap-3 mb-4">
                    <span id="class-icon" class="text-3xl">⚔️</span>
                    <div>
                        <h2 id="ui-house-name" class="title-font text-purple-400 text-sm tracking-widest uppercase">House ---</h2>
                        <p id="class-display" class="text-gray-500 text-xs italic"></p>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <div class="flex justify-between text-xs title-font tracking-tighter">
                        <span class="text-red-400">VITALITY</span>
                        <span id="stat-hp" class="text-gray-400">0 / 0</span>
                    </div>
                    <div class="w-full h-2 stat-bar-bg rounded-full overflow-hidden">
                        <div id="hp-bar-fill" class="h-full bg-red-700 w-full"></div>
                    </div>
                </div>
            </div>

            <div class="sidebar-box rounded-lg p-5 flex-1 flex flex-col">
                <h3 class="title-font text-[10px] text-purple-500 tracking-[0.3em] uppercase mb-6 border-b border-purple-900/30 pb-2">Attributes</h3>
                
                <div class="space-y-5">
                    <div class="space-y-1">
                        <div class="flex justify-between text-xs uppercase tracking-widest text-gray-400">
                            <span>Strength</span><span id="stat-str" class="text-orange-400">0</span>
                        </div>
                        <div class="stat-bar-bg h-1 w-full rounded-full"><div id="bar-str" class="h-full bg-orange-600/50" style="width: 0%"></div></div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-xs uppercase tracking-widest text-gray-400">
                            <span>Agility</span><span id="stat-agi" class="text-blue-400">0</span>
                        </div>
                        <div class="stat-bar-bg h-1 w-full rounded-full"><div id="bar-agi" class="h-full bg-blue-600/50" style="width: 0%"></div></div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-xs uppercase tracking-widest text-gray-400">
                            <span>Constitution</span><span id="stat-con" class="text-green-400">0</span>
                        </div>
                        <div class="stat-bar-bg h-1 w-full rounded-full"><div id="bar-con" class="h-full bg-green-600/50" style="width: 0%"></div></div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-xs uppercase tracking-widest text-gray-400">
                            <span>Arcane</span><span id="stat-arc" class="text-purple-400">0</span>
                        </div>
                        <div class="stat-bar-bg h-1 w-full rounded-full"><div id="bar-arc" class="h-full bg-purple-600/50" style="width: 0%"></div></div>
                    </div>
                </div>

                <h3 class="title-font text-[10px] text-purple-500 tracking-[0.3em] uppercase mt-10 mb-4 border-b border-purple-900/30 pb-2">Possessions</h3>
                
                <ul id="inventory-list" class="text-xs space-y-2 text-gray-500 italic flex-1">
                    <li>• Nothing but hope</li>
                </ul>

                <div class="mt-auto pt-4 border-t border-purple-900/20">
                    <button onclick="abandonLegacy()" class="w-full title-font text-[9px] text-gray-600 hover:text-red-500 transition-colors uppercase tracking-[0.2em]">
                        Abandon Legacy
                    </button>
                </div>
            </div> 
            
        </div>

        <!-- Main Panel -->
        <div class="flex-1 flex flex-col bg-gray-900 border border-purple-900/40 rounded-lg shadow-[0_0_40px_rgba(88,28,135,0.2)] overflow-hidden">
            
            <div class="relative h-64 bg-gray-950 border-b border-purple-900/30 flex items-center justify-center overflow-hidden flex-shrink-0">
                <img id="scene-image" src="" class="object-cover w-full h-full opacity-0 absolute inset-0 transition-opacity duration-1000">
                <div id="image-placeholder" class="flex flex-col items-center gap-2 text-gray-800">
                    <span class="text-5xl">🌑</span>
                    <span class="title-font text-[10px] tracking-[0.5em] uppercase">Visualizing the Beyond</span>
                </div>
                <div class="absolute bottom-4 left-4 bg-gray-950/80 px-3 py-1 border border-purple-900/40 rounded">
                    <span class="text-[10px] title-font text-purple-500 uppercase tracking-widest mr-2">Location:</span>
                    <span id="location-display" class="text-[10px] title-font text-gray-300 uppercase tracking-widest">---</span>
                </div>
            </div>

            <div id="narrative-log" class="flex-1 p-8 overflow-y-auto space-y-6 min-h-0">
                <p class="text-purple-400 italic title-font text-sm tracking-widest text-center">— THE VOID STIRS. YOUR LEGACY BEGINS. —</p>
            </div>

            <div class="action-row p-5 flex gap-4 items-center flex-shrink-0">
                <span class="text-purple-700 title-font text-xl">›</span>
                <input type="text" id="action-input" placeholder="What is your command?" 
                       class="flex-1 bg-transparent text-green-400 placeholder-gray-800 font-mono text-sm border-none outline-none">
                <button id="submit-btn" class="title-font text-[10px] tracking-widest uppercase px-6 py-3 bg-purple-900 hover:bg-purple-700 text-white rounded transition-all">
                    ACT
                </button>
            </div>
        </div>
    </div>

    <div id="levelup-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-gray-900 border border-purple-500/50 p-8 rounded-lg max-w-md w-full text-center shadow-[0_0_50px_rgba(168,85,247,0.2)]">
            <h2 class="title-font text-3xl text-purple-400 mb-2 tracking-widest uppercase">Level Up</h2>
            <p class="text-gray-400 italic mb-6">Your survival has sharpened you. Choose a path of growth.</p>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="sendLevelUp('str')" class="border border-orange-900/50 bg-orange-950/20 hover:bg-orange-900/40 text-orange-400 p-3 rounded transition-colors uppercase title-font tracking-wider text-sm">
                    Strength
                </button>
                <button onclick="sendLevelUp('agi')" class="border border-blue-900/50 bg-blue-950/20 hover:bg-blue-900/40 text-blue-400 p-3 rounded transition-colors uppercase title-font tracking-wider text-sm">
                    Agility
                </button>
                <button onclick="sendLevelUp('con')" class="border border-green-900/50 bg-green-950/20 hover:bg-green-900/40 text-green-400 p-3 rounded transition-colors uppercase title-font tracking-wider text-sm">
                    Constitution
                </button>
                <button onclick="sendLevelUp('arc')" class="border border-purple-900/50 bg-purple-950/20 hover:bg-purple-900/40 text-purple-400 p-3 rounded transition-colors uppercase title-font tracking-wider text-sm">
                    Arcane
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- STATE ---
        let gameState = null;
        const log   = document.getElementById('narrative-log');
        const input = document.getElementById('action-input');
        const btn   = document.getElementById('submit-btn');

        const CLASS_ICONS = {
            ashen_knight: '⚔️',
            void_drifter:  '🗡️',
            rune_scribe:   '📜',
            void_ranger:   '🏹',
        };

        // --- UPDATE UI ---
        function updateUI() {
            if (!gameState) return;

            // House name & class
            document.getElementById('ui-house-name').innerText = `House ${gameState.house_name}`;
            document.getElementById('class-display').innerText = (gameState.class || '').replace(/_/g, ' ');
            document.getElementById('class-icon').innerText    = CLASS_ICONS[gameState.class] || '⚔️';

            // HP
            document.getElementById('stat-hp').innerText = `${gameState.hp} / ${gameState.max_hp}`;
            const hpPct = Math.max(0, (gameState.hp / gameState.max_hp) * 100);
            document.getElementById('hp-bar-fill').style.width = hpPct + '%';

            // Attributes
            const statMap = {
                str: { el: 'stat-str', bar: 'bar-str' },
                agi: { el: 'stat-agi', bar: 'bar-agi' },
                con: { el: 'stat-con', bar: 'bar-con' },
                arc: { el: 'stat-arc', bar: 'bar-arc' },
            };
            Object.entries(statMap).forEach(([key, ids]) => {
                const val = gameState[key] || 0;
                document.getElementById(ids.el).innerText    = val;
                document.getElementById(ids.bar).style.width = Math.min(val * 5, 100) + '%';
            });

            // Inventory
            const inv = gameState.inventory || [];
            document.getElementById('inventory-list').innerHTML = inv.length
                ? inv.map(i => `<li>• ${i.replace(/_/g, ' ')}</li>`).join('')
                : '<li>• Nothing but hope</li>';

            // Location
            if (gameState.location) {
                document.getElementById('location-display').innerText =
                    gameState.location.replace(/_/g, ' ').toUpperCase();
            }

            // Trigger Level Up Modal if ready
            if (gameState.xp >= gameState.xp_to_next_level) {
                document.getElementById('levelup-modal').classList.remove('hidden');
            }
        }

        // --- INITIAL LOAD ---
        window.onload = () => {
            const playerId   = sessionStorage.getItem('playerId');
            const playerName = sessionStorage.getItem('playerName');

            if (!playerId || !playerName) {
                window.location.href = '/';
                return;
            }

            const saved = localStorage.getItem(`echoes_save_${playerName}`);
            if (saved) {
                gameState = JSON.parse(saved);
                updateUI();
            } else {
                window.location.href = '/';
            }
        };

        // --- ABANDON LEGACY ---
        function abandonLegacy() {
            if (confirm("Are you sure you want to end this lineage? All current progress for this House will be lost forever.")) {
                const playerName = gameState ? gameState.house_name : sessionStorage.getItem('playerName');
                if (playerName) localStorage.removeItem(`echoes_save_${playerName}`);
                sessionStorage.clear();
                window.location.href = '/';
            }
        }

        // --- LEVEL UP LOGIC ---
        async function sendLevelUp(stat) {
            try {
                const response = await fetch('/levelup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        player_id: gameState.player_id,
                        stat_to_increase: stat
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    gameState = data.state;
                    localStorage.setItem(`echoes_save_${gameState.house_name}`, JSON.stringify(gameState));
                    
                    document.getElementById('levelup-modal').classList.add('hidden');
                    updateUI();

                    // Drop a cool message in the chat
                    const sysMsg = document.createElement('p');
                    sysMsg.className = "text-yellow-500 font-black title-font text-sm tracking-widest text-center mt-4 mb-4 msg-fade";
                    sysMsg.innerText = `✦ LEVEL ${gameState.level} REACHED: ${stat.toUpperCase()} INCREASED ✦`;
                    log.appendChild(sysMsg);
                    log.scrollTop = log.scrollHeight;
                }
            } catch (e) {
                console.error("Level up failed:", e);
            }
        }

        // --- ACTION LOOP ---
        async function sendAction() {
            const actionText = input.value.trim();
            if (!actionText || !gameState) return;

            // Show player input
            const pMsg = document.createElement('p');
            pMsg.className = "text-green-500/80 font-mono text-xs opacity-60 italic";
            pMsg.innerText = `› ${actionText}`;
            log.appendChild(pMsg);

            input.value    = '';
            input.disabled = true;
            btn.disabled   = true;

            try {
                const response = await fetch('/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        player_id: gameState.player_id,
                        action:    actionText,
                        state:     gameState
                    })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({ detail: 'Unknown server error' }));
                    throw new Error(err.detail || 'Server error');
                }

                const data = await response.json();

                // Sync state from backend
                if (data.state) {
                    gameState = data.state;
                    localStorage.setItem(`echoes_save_${gameState.house_name}`, JSON.stringify(gameState));
                }

                updateUI();

                // Show narrative
                const sMsg = document.createElement('p');
                sMsg.className = "text-gray-300 leading-relaxed msg-fade";
                sMsg.innerText = data.text;
                log.appendChild(sMsg);

                log.scrollTop = log.scrollHeight;

            } catch (e) {
                const err = document.createElement('p');
                err.className = "text-red-500 text-xs msg-fade";
                err.innerText = `System Error: ${e.message}`;
                log.appendChild(err);
            } finally {
                input.disabled = false;
                btn.disabled   = false;
                input.focus();
            }
        }

        btn.addEventListener('click', sendAction);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendAction(); });
    </script>
</body>
</html>
