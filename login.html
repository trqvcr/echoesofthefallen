<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of the Fallen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;1,400&display=swap');

        body {
            background-color: #030609;
            font-family: 'Crimson Text', serif;
        }

        .title-font { font-family: 'Cinzel', serif; }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: var(--max-opacity); }
        }

        .ember {
            position: absolute;
            width: 3px; height: 3px;
            border-radius: 50%;
            background: #a855f7;
            animation: float var(--duration) ease-in-out infinite;
            opacity: 0;
            filter: blur(1px);
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20px) translateX(var(--drift)); opacity: 0; }
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(168,85,247,0.4), 0 0 40px rgba(168,85,247,0.2); }
            50% { text-shadow: 0 0 40px rgba(168,85,247,0.8), 0 0 80px rgba(168,85,247,0.4), 0 0 120px rgba(168,85,247,0.2); }
        }

        .title-glow { animation: glow 3s ease-in-out infinite; }

        .rune-line {
            background: linear-gradient(90deg, transparent, #7c3aed, #a855f7, #7c3aed, transparent);
            height: 1px;
        }

        .void-input {
            background: rgba(15, 10, 25, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #e2d9f3;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.1em;
        }

        .void-input:focus {
            outline: none;
            border-color: rgba(168, 85, 247, 0.8);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3), inset 0 0 20px rgba(168, 85, 247, 0.05);
        }

        .void-input::placeholder {
            color: rgba(139, 92, 246, 0.4);
            font-style: italic;
        }

        .enter-btn {
            background: linear-gradient(135deg, #4c1d95, #7c3aed);
            border: 1px solid rgba(168, 85, 247, 0.5);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }

        .enter-btn:hover:not(:disabled)::before { left: 100%; }
        .enter-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #5b21b6, #9333ea);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
            transform: translateY(-1px);
        }
        .enter-btn:active { transform: translateY(0); }
        .enter-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        @keyframes fadeOut {
            to { opacity: 0; transform: scale(1.05); }
        }
        .fade-out { animation: fadeOut 0.8s ease forwards; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in-up { animation: fadeInUp 1s ease forwards; }
        .delay-1 { animation-delay: 0.3s; opacity: 0; }
        .delay-2 { animation-delay: 0.6s; opacity: 0; }
        .delay-3 { animation-delay: 0.9s; opacity: 0; }
        .delay-4 { animation-delay: 1.2s; opacity: 0; }

        .select-btn {
            transition: all 0.25s ease;
            cursor: pointer;
            background: rgba(10, 5, 20, 0.6);
        }

        .select-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        .select-btn.selected {
            border-color: #a855f7 !important;
            background: rgba(168, 85, 247, 0.15);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.25);
        }

        .stat-bar {
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #7c3aed, #a855f7);
        }

        /* Mode tabs (Register / Login) */
        .mode-tab {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.15em;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
            padding-bottom: 8px;
            cursor: pointer;
        }
        .mode-tab.active {
            border-bottom-color: #a855f7;
            color: #e2d9f3;
        }

        /* Race/class tabs */
        .tab-btn {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            border-bottom-color: #a855f7;
            color: #e2d9f3;
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .mode-panel { display: none; }
        .mode-panel.active { display: block; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-y-auto py-10">
    <div class="stars" id="stars"></div>

    <div id="login-card" class="relative z-10 flex flex-col items-center text-center px-8 py-10 max-w-2xl w-full">

        <div class="fade-in-up delay-1 mb-4 text-5xl">👑</div>

        <h1 class="title-font title-glow fade-in-up delay-1 text-5xl font-black text-white mb-2 tracking-widest uppercase">
            Echoes
        </h1>
        <h2 class="title-font fade-in-up delay-1 text-xl font-normal text-purple-400 tracking-[0.5em] uppercase mb-6">
            of the Fallen
        </h2>

        <div class="rune-line w-full mb-6 fade-in-up delay-2"></div>

        <p class="fade-in-up delay-2 text-gray-400 italic text-lg leading-relaxed mb-6">
            Three hundred years after the Shattering, the ruins of Valdris still whisper the names of those who dared seek the Crown's shards.
        </p>

        <!-- Mode switcher: Register / Login -->
        <div class="fade-in-up delay-2 w-full flex gap-8 justify-center mb-6 border-b border-purple-900/40 pb-0">
            <button class="mode-tab active text-gray-300 text-xs uppercase" onclick="switchMode('register')">New Character</button>
            <button class="mode-tab text-gray-600 text-xs uppercase" onclick="switchMode('login')">Return</button>
        </div>

        <!-- ── REGISTER PANEL ── -->
        <div id="panel-register" class="mode-panel active w-full">

            <p class="text-purple-300 italic mb-6">What name shall the void remember?</p>

            <div class="w-full mb-4">
                <input type="text" id="reg-name"
                    class="void-input w-full px-6 py-4 rounded text-center text-lg"
                    placeholder="Your name..."
                    maxlength="24"/>
            </div>

            <div class="w-full mb-4">
                <input type="password" id="reg-password"
                    class="void-input w-full px-6 py-4 rounded text-center text-lg"
                    placeholder="Choose a password..."
                    maxlength="64"/>
            </div>

            <!-- Race / Class tabs -->
            <div class="w-full mb-6">
                <div class="flex gap-6 mb-4 border-b border-purple-900/40 pb-1">
                    <button class="tab-btn active text-gray-300 text-xs uppercase tracking-widest pb-2" onclick="switchTab('race')">Choose Race</button>
                    <button class="tab-btn text-gray-600 text-xs uppercase tracking-widest pb-2" onclick="switchTab('class')">Choose Class</button>
                </div>

                <div id="tab-race" class="tab-panel active">
                    <div class="grid grid-cols-2 gap-3">

                        <button onclick="selectRace('human')" id="race-human" class="select-btn rounded border border-gray-700 p-4 text-left">
                            <div class="text-2xl mb-2">🧑</div>
                            <div class="title-font text-gray-200 text-sm mb-1">Human</div>
                            <div class="text-gray-500 text-xs mb-2">Adaptable survivors. Learn faster than any other race.</div>
                            <div class="text-purple-400 text-xs italic">Passive: +10% bonus XP</div>
                        </button>

                        <button onclick="selectRace('ashen_elf')" id="race-ashen_elf" class="select-btn rounded border border-gray-700 p-4 text-left">
                            <div class="text-2xl mb-2">🧝</div>
                            <div class="title-font text-gray-200 text-sm mb-1">Ashen Elf</div>
                            <div class="text-gray-500 text-xs mb-2">Ancient beings merged with ash. Graceful but cold.</div>
                            <div class="text-purple-400 text-xs italic">Passive: Silent movement, -10% detection</div>
                            <div class="mt-2 space-y-1">
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">AGI</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:80%"></div></div><span class="text-green-500 text-xs">+2</span></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">ARC</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:40%"></div></div><span class="text-green-500 text-xs">+1</span></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">CON</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:20%"></div></div><span class="text-red-500 text-xs">-1</span></div>
                            </div>
                        </button>

                        <button onclick="selectRace('ironborn_dwarf')" id="race-ironborn_dwarf" class="select-btn rounded border border-gray-700 p-4 text-left">
                            <div class="text-2xl mb-2">⛏️</div>
                            <div class="title-font text-gray-200 text-sm mb-1">Ironborn Dwarf</div>
                            <div class="text-gray-500 text-xs mb-2">Stocky survivors who rebuilt their forges. Tough as stone.</div>
                            <div class="text-purple-400 text-xs italic">Passive: Reduce physical damage by 1</div>
                            <div class="mt-2 space-y-1">
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">STR</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:80%"></div></div><span class="text-green-500 text-xs">+2</span></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">CON</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:80%"></div></div><span class="text-green-500 text-xs">+2</span></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">AGI</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:10%"></div></div><span class="text-red-500 text-xs">-2</span></div>
                            </div>
                        </button>

                        <button onclick="selectRace('void_goblin')" id="race-void_goblin" class="select-btn rounded border border-gray-700 p-4 text-left">
                            <div class="text-2xl mb-2">👺</div>
                            <div class="title-font text-gray-200 text-sm mb-1">Void Goblin</div>
                            <div class="text-gray-500 text-xs mb-2">Small, cunning, mutated by Void energy. Underestimated by everyone.</div>
                            <div class="text-purple-400 text-xs italic">Passive: Always find extra loot</div>
                            <div class="mt-2 space-y-1">
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">AGI</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:100%"></div></div><span class="text-green-500 text-xs">+3</span></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">ARC</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:40%"></div></div><span class="text-green-500 text-xs">+1</span></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">STR</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:10%"></div></div><span class="text-red-500 text-xs">-2</span></div>
                            </div>
                        </button>

                    </div>
                </div>

                <div id="tab-class" class="tab-panel">
                    <div class="grid grid-cols-2 gap-3">

                        <button onclick="selectClass('ashen_knight')" id="class-ashen_knight" class="select-btn rounded border border-gray-700 p-4 text-left">
                            <div class="text-2xl mb-2">⚔️</div>
                            <div class="title-font text-gray-200 text-sm mb-1">Ashen Knight</div>
                            <div class="text-gray-500 text-xs mb-3">Heavily armored survivor of the old royal guard. Brute force and endurance.</div>
                            <div class="space-y-1">
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">STR</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:80%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">AGI</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:30%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">CON</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:70%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">ARC</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:20%"></div></div></div>
                            </div>
                            <div class="mt-2 text-purple-400 text-xs italic">Skills: Shield Bash, Iron Stance</div>
                        </button>

                        <button onclick="selectClass('void_drifter')" id="class-void_drifter" class="select-btn rounded border border-gray-700 p-4 text-left">
                            <div class="text-2xl mb-2">🗡️</div>
                            <div class="title-font text-gray-200 text-sm mb-1">Void Drifter</div>
                            <div class="text-gray-500 text-xs mb-3">A rogue who survived the cataclysm in shadows. Blindingly fast and lethal.</div>
                            <div class="space-y-1">
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">STR</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:50%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">AGI</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:90%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">CON</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:40%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">ARC</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:20%"></div></div></div>
                            </div>
                            <div class="mt-2 text-purple-400 text-xs italic">Skills: Poison Blade, Shadow Step</div>
                        </button>

                        <button onclick="selectClass('rune_scribe')" id="class-rune_scribe" class="select-btn rounded border border-gray-700 p-4 text-left">
                            <div class="text-2xl mb-2">📜</div>
                            <div class="title-font text-gray-200 text-sm mb-1">Rune-Scribe</div>
                            <div class="text-gray-500 text-xs mb-3">A scholar wielding the shattered magic that destroyed the world. Glass cannon.</div>
                            <div class="space-y-1">
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">STR</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:20%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">AGI</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:40%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">CON</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:40%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">ARC</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:100%"></div></div></div>
                            </div>
                            <div class="mt-2 text-purple-400 text-xs italic">Skills: Void Bolt, Rune Ward, Arcane Sight</div>
                        </button>

                        <button onclick="selectClass('void_ranger')" id="class-void_ranger" class="select-btn rounded border border-gray-700 p-4 text-left">
                            <div class="text-2xl mb-2">🏹</div>
                            <div class="title-font text-gray-200 text-sm mb-1">Void Ranger</div>
                            <div class="text-gray-500 text-xs mb-3">A spectral archer channeling Void energy through their bow. Deadly at range.</div>
                            <div class="space-y-1">
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">STR</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:30%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">AGI</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:100%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">CON</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:30%"></div></div></div>
                                <div class="flex items-center gap-2"><span class="text-gray-600 text-xs w-6">ARC</span><div class="stat-bar flex-1"><div class="stat-fill" style="width:40%"></div></div></div>
                            </div>
                            <div class="mt-2 text-purple-400 text-xs italic">Skills: Void Shot, Hunter's Eye</div>
                        </button>

                    </div>
                </div>
            </div>

            <div id="selection-summary" class="w-full mb-4 px-4 py-3 rounded border border-purple-900/40 bg-purple-950/20 text-sm text-gray-400 title-font tracking-wide">
                <span id="summary-race" class="text-purple-300">Human</span>
                <span class="text-gray-600 mx-2">·</span>
                <span id="summary-class" class="text-purple-300">Ashen Knight</span>
            </div>

            <button onclick="enterGame()" class="enter-btn w-full py-4 text-white rounded text-sm uppercase mb-3">
                Enter the Void
            </button>

        </div>

        <!-- ── LOGIN PANEL ── -->
        <div id="panel-login" class="mode-panel w-full">

            <p class="text-purple-300 italic mb-6">The void remembers your name.</p>

            <div class="w-full mb-4">
                <input type="text" id="login-name"
                    class="void-input w-full px-6 py-4 rounded text-center text-lg"
                    placeholder="Your name..."
                    maxlength="24"/>
            </div>

            <div class="w-full mb-6">
                <input type="password" id="login-password"
                    class="void-input w-full px-6 py-4 rounded text-center text-lg"
                    placeholder="Your password..."
                    maxlength="64"/>
            </div>

            <button onclick="loginGame()" class="enter-btn w-full py-4 text-white rounded text-sm uppercase mb-3">
                Return to the Void
            </button>

        </div>

        <div class="rune-line w-full mt-4 fade-in-up delay-4"></div>
        <p class="fade-in-up delay-4 text-gray-700 text-xs mt-4 title-font tracking-widest">
            YOUR DEATH WILL NOT BE FORGOTTEN
        </p>
    </div>

    <script>
        // ── Stars & Embers ────────────────────────────────────────────────
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                --duration: ${2 + Math.random() * 4}s;
                --max-opacity: ${0.3 + Math.random() * 0.7};
                animation-delay: ${Math.random() * 4}s;
                width: ${Math.random() > 0.8 ? 3 : 2}px;
                height: ${Math.random() > 0.8 ? 3 : 2}px;
            `;
            starsContainer.appendChild(star);
        }
        for (let i = 0; i < 15; i++) {
            const ember = document.createElement('div');
            ember.className = 'ember';
            ember.style.cssText = `
                left: ${Math.random() * 100}%;
                bottom: 0;
                --duration: ${6 + Math.random() * 8}s;
                --drift: ${-50 + Math.random() * 100}px;
                animation-delay: ${Math.random() * 8}s;
            `;
            starsContainer.appendChild(ember);
        }

        // ── State ─────────────────────────────────────────────────────────
        let selectedRace  = 'human';
        let selectedClass = 'ashen_knight';

        const RACE_LABELS = {
            human:          'Human',
            ashen_elf:      'Ashen Elf',
            ironborn_dwarf: 'Ironborn Dwarf',
            void_goblin:    'Void Goblin',
        };
        const CLASS_LABELS = {
            ashen_knight: 'Ashen Knight',
            void_drifter: 'Void Drifter',
            rune_scribe:  'Rune-Scribe',
            void_ranger:  'Void Ranger',
        };

        selectRace('human');
        selectClass('ashen_knight');

        // ── Mode switching (Register / Login) ─────────────────────────────
        function switchMode(mode) {
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.mode-tab').forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-gray-600');
                b.classList.remove('text-gray-300');
            });
            document.getElementById(`panel-${mode}`).classList.add('active');
            const tabs = document.querySelectorAll('.mode-tab');
            const idx  = mode === 'register' ? 0 : 1;
            tabs[idx].classList.add('active', 'text-gray-300');
            tabs[idx].classList.remove('text-gray-600');
        }

        // ── Race/Class tab switching ───────────────────────────────────────
        function switchTab(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-gray-600');
                b.classList.remove('text-gray-300');
            });
            document.getElementById(`tab-${tab}`).classList.add('active');
            const btns = document.querySelectorAll('.tab-btn');
            const idx  = tab === 'race' ? 0 : 1;
            btns[idx].classList.add('active', 'text-gray-300');
            btns[idx].classList.remove('text-gray-600');
        }

        // ── Selection helpers ──────────────────────────────────────────────
        function selectRace(race) {
            selectedRace = race;
            document.querySelectorAll('[id^="race-"]').forEach(b => b.classList.remove('selected'));
            document.getElementById(`race-${race}`).classList.add('selected');
            document.getElementById('summary-race').textContent = RACE_LABELS[race] || race;
        }

        function selectClass(cls) {
            selectedClass = cls;
            document.querySelectorAll('[id^="class-"]').forEach(b => b.classList.remove('selected'));
            document.getElementById(`class-${cls}`).classList.add('selected');
            document.getElementById('summary-class').textContent = CLASS_LABELS[cls] || cls;
        }

        // ── Shared: save session and redirect ─────────────────────────────
        function startSession(data, name, isNew = false) {
            const { avatar_portrait, ...lean } = data.state || {};
            localStorage.setItem(`echoes_save_${name}`, JSON.stringify(lean));
            sessionStorage.setItem('playerName',  name);
            sessionStorage.setItem('playerClass', data.state.class);
            sessionStorage.setItem('playerRace',  data.state.race);
            sessionStorage.setItem('playerId',    data.player_id);
            document.getElementById('login-card').classList.add('fade-out');
            setTimeout(() => { window.location.href = isNew ? '/intro' : '/game'; }, 800);
        }

        // ── Register ───────────────────────────────────────────────────────
        document.getElementById('reg-name').addEventListener('keypress', e => { if (e.key === 'Enter') enterGame(); });
        document.getElementById('reg-password').addEventListener('keypress', e => { if (e.key === 'Enter') enterGame(); });

        async function enterGame() {
            const nameInput = document.getElementById('reg-name');
            const passInput = document.getElementById('reg-password');
            const name      = nameInput.value.trim();
            const password  = passInput.value;

            if (!name) {
                alert("The void demands a name!");
                nameInput.style.borderColor = '#ef4444';
                nameInput.focus();
                return;
            }
            if (!password || password.length < 4) {
                alert("Password must be at least 4 characters.");
                passInput.style.borderColor = '#ef4444';
                passInput.focus();
                return;
            }

            const btn = document.querySelector('#panel-register .enter-btn');
            btn.textContent = 'Entering the Void...';
            btn.disabled = true;

            try {
                const response = await fetch('/register', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        name:         name,
                        race:         selectedRace,
                        player_class: selectedClass,
                        password:     password,
                    })
                });

                let data;
                try { data = await response.json(); }
                catch { throw new Error("Server crashed or returned non-JSON. Check your terminal!"); }

                if (!response.ok) throw new Error(data.detail || 'Registration failed');

                startSession(data, name, true);

            } catch (err) {
                btn.textContent = 'Enter the Void';
                btn.disabled = false;
                nameInput.style.borderColor = '#ef4444';
                alert('ERROR: ' + err.message);
            }
        }

        // ── Login ──────────────────────────────────────────────────────────
        document.getElementById('login-name').addEventListener('keypress', e => { if (e.key === 'Enter') loginGame(); });
        document.getElementById('login-password').addEventListener('keypress', e => { if (e.key === 'Enter') loginGame(); });

        async function loginGame() {
            const nameInput = document.getElementById('login-name');
            const passInput = document.getElementById('login-password');
            const name      = nameInput.value.trim();
            const password  = passInput.value;

            if (!name || !password) {
                alert("Please enter your name and password.");
                return;
            }

            const btn = document.querySelector('#panel-login .enter-btn');
            btn.textContent = 'Returning...';
            btn.disabled = true;

            try {
                const response = await fetch('/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ name, password })
                });

                let data;
                try { data = await response.json(); }
                catch { throw new Error("Server crashed or returned non-JSON. Check your terminal!"); }

                if (!response.ok) throw new Error(data.detail || 'Login failed');

                startSession(data, name);

            } catch (err) {
                btn.textContent = 'Return to the Void';
                btn.disabled = false;
                nameInput.style.borderColor = '#ef4444';
                alert('ERROR: ' + err.message);
            }
        }
    </script>
</body>
</html>
